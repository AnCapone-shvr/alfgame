<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Operazione Liberazione</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Sora:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0c0f0b;--gold:#d4a942;--red:#b03020;--green:#2e7d4a;}
html,body{height:100%;background:var(--bg);display:flex;justify-content:center;align-items:flex-start;overflow:hidden;font-family:'Sora',sans-serif;}
#wrap{width:100%;max-width:420px;display:flex;flex-direction:column;height:100%;position:relative;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:#111;color:var(--gold);font-size:12px;border-bottom:1px solid #2a2a2a;flex-shrink:0;}
#hud .title{font-family:'Anton',sans-serif;letter-spacing:.06em;font-size:13px;}
#board{position:relative;background:#1c2416;overflow:hidden;flex-shrink:0;touch-action:none;}
.bgimg{position:absolute;left:0;top:0;width:100%;height:100%;image-rendering:pixelated;z-index:0;pointer-events:none;}
.cell-watched{position:absolute;background:rgba(255,195,70,.22);border:1.5px solid rgba(255,195,70,.55);border-radius:2px;pointer-events:none;z-index:2;transition:opacity .15s;}
.guard-wrap{position:absolute;cursor:default;will-change:transform;z-index:8;}
.guard-wrap img{display:block;width:100%;height:100%;image-rendering:pixelated;filter:drop-shadow(0 0 5px rgba(255,205,100,.85)) drop-shadow(0 0 12px rgba(255,170,60,.45));}
.guard-wrap.stunned img{filter:none;opacity:.55;}
.cone{position:absolute;pointer-events:none;transform-origin:0 50%;will-change:transform;z-index:7;}
.alf-el{position:absolute;pointer-events:none;transition:transform .22s linear;will-change:transform;z-index:9;}
.alf-el img{display:block;width:100%;height:100%;image-rendering:pixelated;}
.animal-el{position:absolute;cursor:pointer;z-index:5;}
.animal-el img{display:block;width:100%;height:100%;image-rendering:pixelated;}
.animal-el.disabled{pointer-events:none;opacity:.92;}
.animal-el.exiting{transition:transform .55s ease-in,opacity .55s;opacity:0;}
.flash{position:absolute;inset:0;background:rgba(176,48,32,0);pointer-events:none;transition:background .15s;z-index:30;}
.flash.on{background:rgba(176,48,32,.62);}
.toast{position:absolute;top:14%;left:50%;transform:translateX(-50%);white-space:nowrap;background:#222;color:#fff;font-family:'Anton',sans-serif;font-size:1.3em;padding:7px 18px;border-radius:6px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:25;letter-spacing:.05em;}
.toast.show{opacity:1;}
.toast.bad{background:var(--red);}
.toast.good{background:var(--green);}
.particle{position:absolute;width:7px;height:7px;border-radius:50%;animation:puff .62s forwards;pointer-events:none;z-index:11;}
@keyframes puff{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(var(--dx),var(--dy));opacity:0;}}
.star{position:absolute;font-size:16px;animation:starfly .95s forwards;pointer-events:none;z-index:12;}
@keyframes starfly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--dx),-22px) scale(.4);opacity:0;}}
.gate-tap{position:absolute;cursor:pointer;background:rgba(255,200,80,.0);border-radius:4px;z-index:6;transition:background .2s;}
.gate-tap:hover{background:rgba(255,200,80,.18);}
.gate-tap.open{pointer-events:none;background:rgba(46,205,110,.18);}
.gate-tap .lock{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:16px;}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:40;opacity:0;pointer-events:none;transition:opacity .3s;}
#overlay.show{opacity:1;pointer-events:all;}
.panel{background:#141a12;border:2px solid var(--gold);border-radius:12px;padding:26px 22px;text-align:center;max-width:300px;}
.panel .big{font-family:'Anton',sans-serif;font-size:1.9em;color:var(--gold);letter-spacing:.06em;margin-bottom:8px;line-height:1.1;white-space:pre-line;}
.panel p{color:#bbb;font-size:.88em;margin-bottom:18px;line-height:1.5;}
.panel button{background:var(--gold);color:#111;border:none;border-radius:8px;padding:11px 26px;font-family:'Anton',sans-serif;font-size:1em;letter-spacing:.05em;cursor:pointer;}
#pwbar{display:flex;gap:8px;padding:8px 12px;background:#111;border-top:1px solid #222;flex-shrink:0;}
.pw{background:#1a1f18;border:1.5px solid #3a3a3a;border-radius:8px;padding:6px 14px;font-size:1.2em;cursor:pointer;color:#fff;display:flex;align-items:center;gap:5px;}
.pw span{font-size:.75em;color:var(--gold);font-weight:700;}
.pw.armed{border-color:var(--gold);background:#2a2200;}
.pw.disabled{opacity:.35;pointer-events:none;}
.pw-restart{margin-left:auto;font-family:'Anton',sans-serif;font-size:.85em;letter-spacing:.04em;padding:6px 12px;}
#hint-bar{padding:5px 12px;background:#0d110c;color:#888;font-size:.78em;text-align:center;flex-shrink:0;border-top:1px solid #1a1a1a;}
#spray-layer{position:absolute;inset:0;pointer-events:none;z-index:20;opacity:0;transition:opacity .6s;}
#spray-layer.show{opacity:1;}
.spray-word{font-family:'Anton',sans-serif;font-size:clamp(22px,8vw,34px);color:#c0392b;position:absolute;left:50%;transform:translateX(-50%);text-align:center;letter-spacing:.08em;filter:blur(.4px);text-shadow:0 0 8px rgba(192,57,43,.5),2px 2px 0 rgba(0,0,0,.4);white-space:nowrap;}
.spray-drip{position:absolute;width:5px;background:#c0392b;border-radius:0 0 4px 4px;animation:drip .8s forwards;}
@keyframes drip{0%{height:0;opacity:.9;}100%{height:var(--h);opacity:.7;}}
.spray-dot{position:absolute;width:var(--sz);height:var(--sz);background:#c0392b;border-radius:50%;opacity:.5;}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span class="title">OPERAZIONE LIBERAZIONE</span>
    <div>🐐 <span id="freed">0</span>/<span id="total">—</span></div>
  </div>
  <div id="board">
    <div class="flash" id="flash"></div>
    <div class="toast" id="toast"></div>
    <div id="spray-layer"></div>
  </div>
  <div id="hint-bar">FASE 1 — Apri i cancelli toccandoli</div>
  <div id="pwbar">
    <div class="pw" id="pwClub" onclick="clubArm()">🏏 <span id="clubBadge">2</span></div>
    <div class="pw pw-restart" onclick="build()">↺ RICOMINCIA</div>
  </div>
  <div id="overlay" class="show">
    <div class="panel">
      <div class="big" id="ovTitle">OPERAZIONE
LIBERAZIONE</div>
      <p id="ovText">Apri i cancelli, poi manda l'attivista a liberare ogni animale. Evita il sorvegliante.</p>
      <button id="ovBtn" onclick="startGame()">INIZIA MISSIONE</button>
    </div>
  </div>
</div>

  const h=2*rangePx*Math.tan(halfRad);
  el.style.width=rangePx+'px'; el.style.height=h+'px';
  el.style.left=cx+'px'; el.style.top=(cy-h/2)+'px';
  el.style.transform=`rotate(${angRad}rad)`;
}
const cellX=c=>S.padX+c*(S.cell+GAP);
const cellY=r=>S.padY+r*(S.cell+GAP);
const ctrX=c=>cellX(c)+S.cell/2;
const ctrY=r=>cellY(r)+S.cell/2;

/* perimAt — TOP segment alza di 5px (sorvegliante nel corridoio, non sulle gabbie) */
function perimAt(s){
  const{x0,y0,x1,y1}=S.rect;
  const W=x1-x0, H=y1-y0;
  let d=(((s%1)+1)%1)*S.perim;
  if(d<W)  return{x:x0+d, y:y0-5, nx:0, ny:1};   d-=W;
  if(d<H)  return{x:x1,   y:y0+d, nx:-1,ny:0};   d-=H;
  if(d<W)  return{x:x1-d, y:y1,   nx:0, ny:-1};  d-=W;
  return   {x:x0,   y:y1-d, nx:1, ny:0};
}

function genAnimals(){
  const all=[];
  for(let r=0;r<LEVEL.rows;r++) for(let c=0;c<LEVEL.cols;c++) all.push({c,r});
  all.sort(()=>Math.random()-.5);
  const n=Math.round(all.length*LEVEL.density);
  const dirs=['up','down','left','right'];
  return all.slice(0,n).map((p,i)=>({
    ...p, dir:dirs[i%4], alive:true, id:i
  }));
}

function build(){
  cancelAnimationFrame(rafId);
  locked=false; phase='gates'; gatesOpen=0;
  clubArmed=false; clubCharges=2; gameOver=false;
  $('clubBadge').textContent=2;
  $('pwClub').classList.remove('armed','disabled');
  $('hint-bar').textContent='FASE 1 — Apri i cancelli toccandoli';

  const bw=Math.min(window.innerWidth-4,420);
  const bh=Math.round(bw*16/9);
  board.style.width=bw+'px';
  board.style.height=bh+'px';
  board.innerHTML='';

  /* fondali (chiuso → aperto quando tutti i cancelli sono aperti) */
  const bg=mk('img','bgimg'); bg.src=A_BG_CLOSED; board.appendChild(bg);
  S=S||{}; S.bg=bg;

  const flash=mk('div','flash','flash'); board.appendChild(flash);
  const toastEl=mk('div','toast','toast'); board.appendChild(toastEl);
  const spray=mk('div','','spray-layer'); spray.id='spray-layer'; board.appendChild(spray);

  const pen={
    x:LEVEL.pen.x*bw, y:LEVEL.pen.y*bh,
    w:LEVEL.pen.w*bw, h:LEVEL.pen.h*bh
  };

  const cell=Math.max(22,Math.floor(
    Math.min((pen.w-(LEVEL.cols-1)*GAP)/LEVEL.cols,
             (pen.h-(LEVEL.rows-1)*GAP)/LEVEL.rows)-2));
  const gridW=LEVEL.cols*cell+(LEVEL.cols-1)*GAP;
  const gridH=LEVEL.rows*cell+(LEVEL.rows-1)*GAP;
  const padX=pen.x+(pen.w-gridW)/2;
  const padY=pen.y+(pen.h-gridH)/2-14;

  const RO=Math.round(cell*0.35);
  const rect={x0:pen.x-RO,y0:pen.y-RO,x1:pen.x+pen.w+RO,y1:pen.y+pen.h+RO};
  const perim=2*((rect.x1-rect.x0)+(rect.y1-rect.y0));

  const animals=genAnimals();
  const gates=LEVEL.gates.map(g=>({
    ...g,
    x:g.rx*bw, y:g.ry*bh, w:g.rw*bw, h:g.rh*bh,
    open:false, el:null
  }));

  S={...S,bw,bh,cell,padX,padY,pen,gridW,gridH,
     cols:LEVEL.cols,rows:LEVEL.rows,
     rect,perim,
     animals,gates,
     ctrl:{s:0,stun:0,speed:LEVEL.guard.speed},
     total:animals.length,freed:0,
     alfPos:null,
     cells:{}};

  $('total').textContent=S.total;
  $('freed').textContent=0;

  /* celle invisibili (solo per illuminazione fascio) */
  for(let r=0;r<LEVEL.rows;r++) for(let c=0;c<LEVEL.cols;c++){
    const d=mk('div','cell-light');
    d.style.left=cellX(c)+'px'; d.style.top=cellY(r)+'px';
    d.style.width=cell+'px'; d.style.height=cell+'px';
    d.style.opacity='0';
    d.style.position='absolute';
    d.style.background='rgba(255,195,70,.22)';
    d.style.border='1.5px solid rgba(255,195,70,.55)';
    d.style.borderRadius='2px';
    d.style.pointerEvents='none';
    d.style.zIndex='2';
    d.style.transition='opacity .15s';
    board.appendChild(d); S.cells[`${c},${r}`]=d;
  }

  /* aree tappabili sui cancelli */
  gates.forEach(g=>{
    const el=mk('div','gate-tap');
    el.style.left=g.x+'px'; el.style.top=g.y+'px';
    el.style.width=g.w+'px'; el.style.height=g.h+'px';
    const lock=mk('div','lock'); lock.textContent='🔒'; el.appendChild(lock);
    el.addEventListener('click',()=>tryOpenGate(g));
    g.el=el; g.lockEl=lock; board.appendChild(el);
  });

  /* attivista (ALF) — fuori dal recinto in basso a sx */
  const alfSz=Math.round(cell*1.4);
  const alfEl=mk('div','alf-el');
  const alfImg=mk('img'); alfImg.src=A_ALF; alfEl.appendChild(alfImg);
  alfEl.style.width=alfSz+'px'; alfEl.style.height=alfSz+'px';
  const alfHomeX=pen.x-cell*0.7, alfHomeY=pen.y+pen.h+cell*0.5;
  alfEl.style.transform=`translate(${alfHomeX-alfSz/2}px,${alfHomeY-alfSz/2}px)`;
  board.appendChild(alfEl);
  S.alf=alfEl; S.alfSz=alfSz;
  S.alfHome={x:alfHomeX,y:alfHomeY};
  S.alfPos={x:alfHomeX,y:alfHomeY};

  /* animali (capre) */
  const goatSz=Math.round(cell*1.5);
  animals.forEach(a=>{
    const el=mk('div','animal-el disabled');
    el.style.left=(cellX(a.c)-(goatSz-cell)/2)+'px';
    el.style.top=(cellY(a.r)-(goatSz-cell)/2)+'px';
    el.style.width=goatSz+'px'; el.style.height=goatSz+'px';
    el.style.zIndex=5+a.r;
    const img=mk('img'); img.src=A_GOAT;
    const rotMap={up:0,right:90,down:180,left:270};
    img.style.transform=`rotate(${rotMap[a.dir]}deg)`;
    el.appendChild(img);
    el.addEventListener('click',()=>tryFreeAnimal(a));
    a.el=el; a.img=img;
    board.appendChild(el);
    a.gate=nearestGate(a,gates);
  });

  /* cono visione */
  const coneEl=mk('div','cone');
  coneEl.style.background='radial-gradient(120% 100% at 0 50%,rgba(255,185,40,.55),rgba(255,185,40,.16) 52%,transparent 80%)';
  coneEl.style.clipPath='polygon(0 50%,100% 0,100% 100%)';
  board.appendChild(coneEl);
  S.cone=coneEl;

  /* sorvegliante (allevatore) */
  const guardSz=Math.round(cell*1.55);
  const guardEl=mk('div','guard-wrap');
  const guardImg=mk('img'); guardImg.src=A_FARMER; guardEl.appendChild(guardImg);
  guardEl.style.width=guardSz+'px'; guardEl.style.height=guardSz+'px';
  guardEl.addEventListener('click',clubBonk);
  board.appendChild(guardEl);
  S.guard=guardEl; S.guardSz=guardSz;

  lastT=performance.now();
  rafId=requestAnimationFrame(loop);
}

function nearestGate(animal,gates){
  let best=null, bestD=Infinity;
  const ax=ctrX(animal.c), ay=ctrY(animal.r);
  gates.forEach(g=>{
    const gx=g.x+g.w/2, gy=g.y+g.h/2;
    const dist=Math.hypot(ax-gx,ay-gy);
    if(dist<bestD){bestD=dist;best=g;}
  });
  return best;
}

function loop(now){
  rafId=requestAnimationFrame(loop);
  if(gameOver)return;
  const dt=Math.min(.05,(now-lastT)/1000); lastT=now;

  const ctrl=S.ctrl;
  if(ctrl.stun>0){
    ctrl.stun-=dt;
    if(ctrl.stun<=0){ctrl.stun=0; S.guard.classList.remove('stunned');}
  } else {
    ctrl.s+=ctrl.speed*dt/(S.perim/S.cell);
  }

  const p=perimAt(ctrl.s);
  const ang=Math.atan2(p.ny,p.nx);

  /* il sorvegliante guarda nella direzione di marcia: il png è frontale (testa in basso),
     quindi ruotiamo in modo che il suo "fronte" segua il moto */
  setPos(S.guard, p.x, p.y, ang*180/Math.PI-90, S.guardSz);

  if(ctrl.stun<=0){
    S.cone.style.display='block';
    setCone(S.cone, p.x, p.y, ang, S.cell*LEVEL.guard.range, LEVEL.guard.half*Math.PI/180);
  } else {
    S.cone.style.display='none';
  }

  const newW=new Set();
  if(ctrl.stun<=0) markCone(newW,p.x,p.y,p.nx,p.ny,LEVEL.guard.range,LEVEL.guard.half*Math.PI/180);
  watched.forEach(k=>{if(!newW.has(k))S.cells[k].style.opacity='0';});
  newW.forEach(k=>{if(!watched.has(k))S.cells[k].style.opacity='1';});
  watched=newW;

  /* COLLISIONE ATTIVISTA <> SORVEGLIANTE → scoperto */
  if(S.alfPos && ctrl.stun<=0){
    const dx=S.alfPos.x-p.x, dy=S.alfPos.y-p.y;
    if(Math.hypot(dx,dy)<S.cell*0.88){ caught(); return; }
  }
}

function markCone(set,gx,gy,nx,ny,rangeCells,half){
  const cell=S.cell, len=Math.hypot(nx,ny)||1;
  const ndx=nx/len, ndy=ny/len;
  for(let r=0;r<S.rows;r++) for(let c=0;c<S.cols;c++){
    const vx=ctrX(c)-gx, vy=ctrY(r)-gy;
    const dist=Math.hypot(vx,vy)/cell;
    if(dist>rangeCells||dist<.01)continue;
    const dot=(vx*ndx+vy*ndy)/(dist*cell);
    if(Math.acos(Math.max(-1,Math.min(1,dot)))<=half) set.add(`${c},${r}`);
  }
}

function tryOpenGate(g){
  if(phase!=='gates'||g.open)return;
  g.open=true;
  g.lockEl.textContent='🔓';
  g.el.classList.add('open');
  gatesOpen++;
  if(gatesOpen>=S.gates.length){
    phase='free';
    S.bg.src=A_BG_OPEN;
    $('hint-bar').textContent='FASE 2 — Tocca un animale per liberarlo';
    S.animals.forEach(a=>a.el.classList.remove('disabled'));
    S.gates.forEach(g=>{g.lockEl.style.display='none';});
    toast('Cancelli aperti! Libera le capre.','good');
  }
}

function tryFreeAnimal(a){
  if(!a.alive||locked||phase!=='free'||gameOver)return;

  const path=pathOf(a);
  if(isBlocked(a,path)){ bumpAnim(a); return; }

  const allCells=[[a.c,a.r],...path];
  if(allCells.some(([c,r])=>watched.has(`${c},${r}`))){ caught(); return; }

  locked=true;
  const tx=ctrX(a.c), ty=ctrY(a.r);

  /* check collisione PRE-movimento */
  const gp=perimAt(S.ctrl.s);
  if(S.ctrl.stun<=0 && Math.hypot(tx-gp.x,ty-gp.y)<S.cell*0.88){
    locked=false; caught(); return;
  }

  S.alfPos={x:tx,y:ty};
  S.alf.style.transform=`translate(${tx-S.alfSz/2}px,${ty-S.alfSz/2}px)`;

  setTimeout(()=>{
    exitAnimal(a);
    locked=false;
  },230);
}

function pathOf(a){
  const dirs={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  const[dc,dr]=dirs[a.dir];
  const cells=[]; let c=a.c+dc, r=a.r+dr;
  while(c>=0&&c<S.cols&&r>=0&&r<S.rows){cells.push([c,r]);c+=dc;r+=dr;}
  return cells;
}

function isBlocked(a,path){
  for(const[c,r]of path){
    if(S.animals.some(o=>o.alive&&o.id!==a.id&&o.c===c&&o.r===r))return true;
  }
  return false;
}

function bumpAnim(a){
  const dirs={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  const[dc,dr]=dirs[a.dir];
  const x0=parseFloat(a.el.style.left), y0=parseFloat(a.el.style.top);
  a.el.style.transition='left .12s,top .12s';
  a.el.style.left=(x0+dc*6)+'px'; a.el.style.top=(y0+dr*6)+'px';
  setTimeout(()=>{a.el.style.left=x0+'px'; a.el.style.top=y0+'px'; setTimeout(()=>a.el.style.transition='',150);},140);
}

function exitAnimal(a){
  a.alive=false;
  puff(ctrX(a.c),ctrY(a.r));
  const dirs={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  const[dc,dr]=dirs[a.dir];
  const dist=(S.cols+S.rows)*S.cell;
  a.el.classList.add('exiting');
  const x0=parseFloat(a.el.style.left), y0=parseFloat(a.el.style.top);
  a.el.style.left=(x0+dc*dist)+'px'; a.el.style.top=(y0+dr*dist)+'px';

  S.freed++; $('freed').textContent=S.freed;

  setTimeout(()=>{
    S.alfPos={x:S.alfHome.x,y:S.alfHome.y};
    S.alf.style.transform=`translate(${S.alfHome.x-S.alfSz/2}px,${S.alfHome.y-S.alfSz/2}px)`;
  },280);

  if(S.freed>=S.total){
    locked=true;
    cancelAnimationFrame(rafId);
    S.cone.style.display='none';
    setTimeout(endWin,650);
  }
}

function caught(){
  if(gameOver)return;
  gameOver=true;
  cancelAnimationFrame(rafId);
  S.cone.style.display='none';

  const fl=$('flash');
  fl.classList.add('on');
  board.animate([
    {transform:'translate(0,0)'},{transform:'translate(-5px,3px)'},
    {transform:'translate(5px,-2px)'},{transform:'translate(-3px,2px)'},
    {transform:'translate(0,0)'}
  ],{duration:380});

  toast('SCOPERTO! Ricomincia...','bad');

  setTimeout(()=>{
    fl.classList.remove('on');
    build();
  },950);
}

function endWin(){
  const layer=$('spray-layer'); layer.innerHTML='';
  const slogan=SLOGANS[Math.floor(Math.random()*SLOGANS.length)];
  const totalH=slogan.length*42+10;
  const startY=(S.bh-totalH)/2;
  slogan.forEach((word,i)=>{
    const w=mk('div','spray-word');
    w.textContent=word;
    w.style.top=(startY+i*42)+'px';
    w.style.animationDelay=(i*.12)+'s';
    layer.appendChild(w);
    for(let d=0;d<6;d++){
      const drip=mk('div','spray-drip');
      const leftPct=20+Math.random()*60;
      const h=18+Math.random()*30;
      drip.style.cssText=`left:calc(${leftPct}%);top:${startY+i*42+34}px;--h:${h}px;animation-delay:${.3+d*.1+i*.12}s;`;
      layer.appendChild(drip);
    }
    for(let s=0;s<12;s++){
      const dot=mk('div','spray-dot');
      const x=5+Math.random()*90, y=startY+i*42-5+Math.random()*40;
      const sz=2+Math.random()*4;
      dot.style.cssText=`left:${x}%;top:${y}px;--sz:${sz}px;`;
      layer.appendChild(dot);
    }
  });
  layer.classList.add('show');
  setTimeout(()=>{
    $('ovTitle').textContent='MISSIONE\nCOMPLETA!';
    $('ovText').textContent='Tutte le capre sono libere. 🐐';
    $('ovBtn').textContent='GIOCA ANCORA';
    $('ovBtn').onclick=()=>{ $('overlay').classList.remove('show'); build(); };
    $('overlay').classList.add('show');
  },2200);
}

function clubArm(){
  if(locked||clubCharges<=0)return;
  if(clubArmed){clubArmed=false; $('pwClub').classList.remove('armed'); return;}
  clubArmed=true; $('pwClub').classList.add('armed');
  toast('Tocca il sorvegliante!','good');
}
function clubBonk(){
  if(!clubArmed||clubCharges<=0||gameOver)return;
  clubArmed=false; clubCharges--;
  $('clubBadge').textContent=clubCharges;
  $('pwClub').classList.remove('armed');
  if(clubCharges<=0) $('pwClub').classList.add('disabled');
  S.ctrl.stun=4.5;
  S.guard.classList.add('stunned');
  S.cone.style.display='none';
  const p=perimAt(S.ctrl.s);
  for(let i=0;i<5;i++){
    const star=mk('div','star'); star.textContent='💫';
    star.style.left=p.x+'px'; star.style.top=(p.y-12)+'px';
    const dx=(Math.random()-.5)*45;
    star.style.setProperty('--dx',dx.toFixed(0)+'px');
    board.appendChild(star);
    setTimeout(()=>star.remove(),1000);
  }
  toast('Sorvegliante a terra! 💫','good');
}

function puff(cx,cy){
  const cols=['#5c636b','#8a5630','#3a3f45'];
  for(let i=0;i<9;i++){
    const p=mk('div','particle');
    const ang=Math.random()*6.28, d=12+Math.random()*22;
    p.style.left=(cx-4)+'px'; p.style.top=(cy-4)+'px';
    p.style.background=cols[i%3];
    p.style.setProperty('--dx',(Math.cos(ang)*d).toFixed(1)+'px');
    p.style.setProperty('--dy',(Math.sin(ang)*d).toFixed(1)+'px');
    board.appendChild(p);
    setTimeout(()=>p.remove(),650);
  }
}

function toast(msg,kind){
  const t=$('toast');
  t.textContent=msg; t.className=`toast show ${kind||'good'}`;
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),900);
}

function startGame(){ $('overlay').classList.remove('show'); build(); }
let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(build,200);});
</script>
